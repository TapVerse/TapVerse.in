<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🍪 Cookie Surprise</title>
    <style>
        /* ── Reset & Base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at center, #2d1b0e 0%, #1a0f08 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            overflow: hidden;
        }

        /* ── Container ── */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            padding: 1.5rem;
            position: relative;
        }

        /* ── Cookie Wrapper (spins) ── */
        .cookie-wrapper {
            width: 220px;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: spin 12s linear infinite;
            cursor: pointer;
            transition: transform 0.15s ease;
            position: relative;
        }

        .cookie-wrapper:hover {
            animation-play-state: paused;
            transform: scale(1.04);
        }

        .cookie-wrapper:active {
            transform: scale(0.92);
            animation-play-state: running;
        }

        /* ── The Cookie ── */
        .cookie {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background:
                radial-gradient(ellipse at 30% 30%, #e8c48a, #c99e6e 50%, #a87b4e 85%, #7a5a34);
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.7),
                inset 0 -8px 20px rgba(60, 35, 15, 0.5),
                inset 0 8px 30px rgba(255, 215, 140, 0.3);
            position: relative;
            border: 2px solid #8b6b47;
            transition: box-shadow 0.3s ease;
        }

        /* cookie edge texture (slight bump) */
        .cookie::before {
            content: '';
            position: absolute;
            inset: 4px;
            border-radius: 50%;
            background:
                radial-gradient(circle at 20% 25%, rgba(255, 225, 170, 0.25) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(180, 120, 70, 0.2) 0%, transparent 40%);
            pointer-events: none;
        }

        /* ── Chocolate Chips ── */
        .chip {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(ellipse at 35% 30%, #4a2f1a, #2d1a0c 80%, #1a0d06);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.6), 0 1px 3px rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }

        /* chip positions & sizes */
        .chip-1 {
            width: 22px;
            height: 26px;
            top: 18%;
            left: 22%;
            transform: rotate(-15deg);
            border-radius: 40% 50% 50% 40%;
        }
        .chip-2 {
            width: 18px;
            height: 20px;
            top: 14%;
            right: 24%;
            transform: rotate(25deg);
            border-radius: 50% 40% 40% 50%;
        }
        .chip-3 {
            width: 28px;
            height: 24px;
            top: 40%;
            left: 10%;
            transform: rotate(10deg);
            border-radius: 50% 50% 40% 40%;
        }
        .chip-4 {
            width: 20px;
            height: 22px;
            top: 36%;
            right: 12%;
            transform: rotate(-8deg);
            border-radius: 40% 50% 50% 40%;
        }
        .chip-5 {
            width: 26px;
            height: 28px;
            bottom: 22%;
            left: 18%;
            transform: rotate(20deg);
            border-radius: 50% 40% 40% 50%;
        }
        .chip-6 {
            width: 16px;
            height: 18px;
            bottom: 18%;
            right: 20%;
            transform: rotate(-12deg);
            border-radius: 40% 40% 50% 50%;
        }
        .chip-7 {
            width: 14px;
            height: 16px;
            top: 55%;
            left: 42%;
            transform: rotate(30deg);
            border-radius: 50% 50% 40% 40%;
        }
        .chip-8 {
            width: 20px;
            height: 18px;
            top: 68%;
            left: 58%;
            transform: rotate(-20deg);
            border-radius: 40% 50% 50% 40%;
        }
        .chip-9 {
            width: 12px;
            height: 14px;
            top: 22%;
            left: 52%;
            transform: rotate(5deg);
            border-radius: 50% 40% 40% 50%;
        }
        .chip-10 {
            width: 16px;
            height: 14px;
            bottom: 40%;
            right: 28%;
            transform: rotate(15deg);
            border-radius: 40% 40% 50% 50%;
        }

        /* highlight on chips */
        .chip::after {
            content: '';
            position: absolute;
            top: 15%;
            left: 20%;
            width: 30%;
            height: 25%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(180, 140, 100, 0.25) 0%, transparent 100%);
            pointer-events: none;
        }

        /* ── "Click for surprise" text ── */
        .cta-text {
            font-size: 1.6rem;
            font-weight: 400;
            letter-spacing: 3px;
            color: #f5e6d3;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6), 0 0 40px rgba(200, 150, 100, 0.15);
            cursor: default;
            opacity: 0.85;
            transition: opacity 0.3s ease, transform 0.3s ease;
            position: relative;
            padding-bottom: 6px;
        }

        .cta-text::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #e8c48a, transparent);
            transition: width 0.4s ease;
        }

        .cookie-wrapper:hover~.cta-text::after,
        .cta-text:hover::after {
            width: 80%;
        }

        .cta-text span {
            display: inline-block;
            animation: pulse-text 2.4s ease-in-out infinite;
        }

        /* ── Tiny sparkle particles (decorative) ── */
        .sparkle {
            position: fixed;
            pointer-events: none;
            font-size: 1.2rem;
            opacity: 0;
            z-index: 10;
            animation: sparkle-fly 1.2s ease-out forwards;
        }

        /* ── Animations ── */
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse-text {
            0%,
            100% {
                opacity: 0.7;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.04);
            }
        }

        @keyframes sparkle-fly {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(0.5) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(1.4) rotate(360deg);
            }
        }

        /* ── Click "bounce" animation ── */
        .cookie-wrapper.bounce {
            animation: bounce-cookie 0.4s ease !important;
        }

        @keyframes bounce-cookie {
            0% {
                transform: scale(1);
            }
            30% {
                transform: scale(0.85) rotate(-8deg);
            }
            60% {
                transform: scale(1.1) rotate(4deg);
            }
            80% {
                transform: scale(0.95) rotate(-2deg);
            }
            100% {
                transform: scale(1) rotate(0deg);
            }
        }

        /* ── Responsive ── */
        @media (max-width: 500px) {
            .cookie-wrapper {
                width: 160px;
                height: 160px;
            }
            .cookie {
                width: 150px;
                height: 150px;
            }
            .chip-1 {
                width: 16px;
                height: 20px;
            }
            .chip-2 {
                width: 14px;
                height: 16px;
            }
            .chip-3 {
                width: 20px;
                height: 18px;
            }
            .chip-4 {
                width: 16px;
                height: 18px;
            }
            .chip-5 {
                width: 20px;
                height: 22px;
            }
            .chip-6 {
                width: 12px;
                height: 14px;
            }
            .chip-7 {
                width: 12px;
                height: 14px;
            }
            .chip-8 {
                width: 16px;
                height: 14px;
            }
            .chip-9 {
                width: 10px;
                height: 12px;
            }
            .chip-10 {
                width: 14px;
                height: 12px;
            }
            .cta-text {
                font-size: 1.2rem;
                letter-spacing: 2px;
            }
        }

        @media (max-width: 380px) {
            .cookie-wrapper {
                width: 130px;
                height: 130px;
            }
            .cookie {
                width: 120px;
                height: 120px;
            }
            .cta-text {
                font-size: 1rem;
                letter-spacing: 1px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Cookie (clickable) -->
        <div class="cookie-wrapper" id="cookieWrapper" role="button" tabindex="0" aria-label="Click On The Cookie">
            <div class="cookie">
                <!-- Chocolate chips -->
                <span class="chip chip-1"></span>
                <span class="chip chip-2"></span>
                <span class="chip chip-3"></span>
                <span class="chip chip-4"></span>
                <span class="chip chip-5"></span>
                <span class="chip chip-6"></span>
                <span class="chip chip-7"></span>
                <span class="chip chip-8"></span>
                <span class="chip chip-9"></span>
                <span class="chip chip-10"></span>
            </div>
        </div>

        <!-- CTA Text -->
        <p class="cta-text">
            <span>✦</span> &nbsp;Click On The Cookie&nbsp; <span>✦</span>
        </p>
    </div>

    <script>
        (function() {
            const cookieWrapper = document.getElementById('cookieWrapper');
            // UPDATED Place ID – opens the review page for this specific place
            const placeId = 'ChIJMVYMgrXJ5zsR1So6_RD5r58';
            const targetURL = `https://search.google.com/local/writereview?placeid=${placeId}`;

            // ── Sparkle burst ──
            function createSparkles(x, y, count = 16) {
                const emojis = ['✨', '⭐', '💫', '🌟', '✦', '•'];
                for (let i = 0; i < count; i++) {
                    const el = document.createElement('div');
                    el.className = 'sparkle';
                    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    const angle = Math.random() * 2 * Math.PI;
                    const dist = 40 + Math.random() * 90;
                    const tx = Math.cos(angle) * dist;
                    const ty = Math.sin(angle) * dist - 40;
                    el.style.setProperty('--tx', tx + 'px');
                    el.style.setProperty('--ty', ty + 'px');
                    el.style.left = (x - 10 + Math.random() * 20) + 'px';
                    el.style.top = (y - 10 + Math.random() * 20) + 'px';
                    el.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
                    el.style.animationDuration = (0.8 + Math.random() * 0.6) + 's';
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 1500);
                }
            }

            // ── Handle click ──
            function handleClick(e) {
                // 1. Bounce animation
                cookieWrapper.classList.remove('bounce');
                // force reflow
                void cookieWrapper.offsetWidth;
                cookieWrapper.classList.add('bounce');

                // 2. Sparkles at click position
                const rect = cookieWrapper.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                createSparkles(cx, cy, 22);

                // 3. Open the Google review page after a tiny delay
                setTimeout(() => {
                    window.open(targetURL, '_blank');
                }, 350);

                // remove bounce class after animation ends
                setTimeout(() => {
                    cookieWrapper.classList.remove('bounce');
                }, 450);
            }

            // ── Events ──
            cookieWrapper.addEventListener('click', handleClick);

            // Keyboard support (Enter / Space)
            cookieWrapper.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    handleClick(e);
                }
            });

            // ── Also trigger on text click (for better UX) ──
            const ctaText = document.querySelector('.cta-text');
            if (ctaText) {
                ctaText.style.cursor = 'pointer';
                ctaText.addEventListener('click', (e) => {
                    // forward click to cookie wrapper
                    const rect = cookieWrapper.getBoundingClientRect();
                    const fakeEvent = {
                        clientX: rect.left + rect.width / 2,
                        clientY: rect.top + rect.height / 2,
                        preventDefault: () => {},
                    };
                    handleClick(fakeEvent);
                });
            }

            console.log('🍪 Cookie surprise ready! New place ID set.');
        })();
    </script>

</body> 
</html>
